<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>Lab9 Javascript in Browser</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Starting Lineup</h1>
  
  <!-- status box with radio buttons -->
  <form>
    <fieldset style="border:1px solid #000; padding:10px; display:inline-block;">
      <legend>Status:</legend>
      <label><input type="radio" name="status" value="draft"> Draft</label>
      <label><input type="radio" name="status" value="final"> Final</label>
    </fieldset>
  </form>
  
  <label for="Date">Date:</label>
  <select name="Date" id="Date">
    <option value="March 20">March 20</option>
    <option value="March 25">March 25</option>
    <option value="March 30">March 30</option>
    <option value="April 5">April 5</option>
  </select>
  

</body>

</html>
